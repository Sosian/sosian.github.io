#for faqs
faqs:
  - title: Was macht ihr wegen COVID-19?
    body: Eine Hoffnung ist natürlich, das die Situation, wie letztes Jahr, im August etwas entspannter ist. Ob die Hochzeit stattfindet hängt natürlich von der gesetzlichen Lage ab. Wir planen aktuell Antigen Tests für alle bei Eintritt zu organisieren um die Sicherheit aller Gäste zu Gewährleisten. Aber nachdem die Situation im Sommer noch nicht abzusehen ist, werden wir euch noch Bescheid geben, wie die Lage ist.
  
  - title: Gibt es eine Kleiderordnung?
    body: Nein, kommt am besten in bequemer Kleidung. Bunt ist gut. No pressure though. Bei (dem von uns bestelltem) Schönwetter findet ein großteil der Hochzeit im freien statt und verlagert sich dann erst für das Essen nach drinnen.
  
  - title: Muss ich beim Picknick am Boden sitzen?
    body: Für alle die nicht wollen gibt es auch Heurigenbänke
  
  - title: Was machen wir bei Schlechtwetter?
    body: Bei Schlechtwetter wird sich ein großteil der Aktivität in die Labstelle verlagern.
  
  - title: Kann ich meinen Hund mitnehmen?
    body: Nein, im Lainzer Tiergarten sind Hunde nicht erlaubt.
