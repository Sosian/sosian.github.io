<!-- About Section -->
<section class="success" id="faq">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2>Fragen und Antworten</h2>
                <hr class="star-light">
            </div>
        </div>
        <div class="row">
            <div class="col-lg-4 col-lg-offset-2">
                {% for item in site.faqs %}
                    <div class="panel">
                        <div class="panel-heading" data-toggle="{{forloop.index}}"> 	
                            <img alt="" class="panel-heading-question" data-toggle="{{forloop.index}}" src="img/questionmark.png"><a data-toggle="{{forloop.index}}" href="javascript:void(0)">{{item.title}}</a>
                        </div>
                            <div class="panel-body hidden-element" data-body="{{forloop.index}}"> 
                            {{item.body}} 
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
</section>
